<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운영 관리 시스템</title>
    <link rel="icon" href="data:,">
    
    <!-- GitHub Pages SPA redirect handler -->
    <script>
        (function() {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Load configuration before other scripts -->
    <script src="config.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0053db',
                        'primary-dim': '#0048c1',
                        surface: '#f8f9ff',
                        'surface-container': '#eff4ff',
                        'on-surface': '#003360',
                        'on-surface-variant': '#2f619a',
                        error: '#9f403d',
                        success: '#059669'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-sans antialiased overflow-hidden h-screen w-screen flex">

    <!-- 로그인 화면 -->
    <div id="login-view" class="fixed inset-0 bg-surface z-50 flex items-center justify-center px-4 overflow-y-auto">
        <div class="w-full max-w-md flex flex-col items-center my-8">
            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h1 class="font-display text-2xl font-bold mb-2 text-center">차일디 운영 관리 시스템</h1>
            <p class="text-on-surface-variant text-sm mb-8 text-center">성과 기반 업무 관리 시스템</p>
            
            <div class="w-full mb-4">
                <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">본부 선택</label>
                <select id="login-division" class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all text-on-surface text-[14px]">
                    <option value="운영본부" selected>운영본부</option>
                </select>
            </div>
            <div class="w-full mb-4">
                <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">사용자 ID</label>
                <input type="text" id="login-id" class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" onkeypress="if(event.key==='Enter') document.getElementById('btn-login').click()">
            </div>
            <div class="w-full mb-8">
                <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">비밀번호</label>
                <input type="password" id="login-pw" class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" onkeypress="if(event.key==='Enter') document.getElementById('btn-login').click()">
            </div>
            <button id="btn-login" class="w-full bg-gradient-to-br from-primary to-primary-dim text-white font-medium py-3 rounded-lg shadow-lg shadow-primary/30 hover:opacity-90 transition-opacity text-[14px] mb-3">
                시스템 접속
            </button>
            <button id="btn-show-signup" onclick="showSignupView()" class="w-full bg-white border border-primary text-primary font-medium py-3 rounded-lg hover:bg-blue-50 transition-all text-[14px]">
                회원가입
            </button>
        </div>
    </div>

    <!-- 회원가입 화면 -->
    <div id="signup-view" class="fixed inset-0 bg-surface z-50 hidden flex items-center justify-center px-4 overflow-y-auto">
        <div class="w-full max-w-md flex flex-col items-center my-8">
            <div class="w-16 h-16 bg-success/10 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            </div>
            <h1 class="font-display text-2xl font-bold mb-2 text-center">회원가입</h1>
            <p class="text-on-surface-variant text-sm mb-8 text-center">차일디 운영 관리 시스템에 가입하세요</p>
            
            <form id="signup-form" class="w-full space-y-4">
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">이름 <span class="text-error">*</span></label>
                    <input type="text" id="signup-name" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" placeholder="홍길동">
                </div>
                
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">이메일 <span class="text-error">*</span></label>
                    <input type="email" id="signup-email" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" placeholder="example@childy.co.kr">
                    <p class="text-[12px] text-on-surface-variant mt-1">이메일의 @ 앞부분이 아이디로 사용됩니다</p>
                </div>
                
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">비밀번호 <span class="text-error">*</span></label>
                    <input type="password" id="signup-password" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" placeholder="비밀번호 입력">
                </div>
                
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">비밀번호 확인 <span class="text-error">*</span></label>
                    <input type="password" id="signup-password-confirm" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" placeholder="비밀번호 재입력">
                </div>
                
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">본부 <span class="text-error">*</span></label>
                    <select id="signup-division" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all text-on-surface text-[14px]">
                        <option value="">본부 선택</option>
                        <option value="운영본부">운영본부</option>
                        <option value="경영지원본부">경영지원본부</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">팀 <span class="text-error">*</span></label>
                    <select id="signup-team" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all text-on-surface text-[14px]">
                        <option value="">팀 선택</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-[14px] font-semibold mb-2 text-on-surface-variant">직무 <span class="text-error">*</span></label>
                    <input type="text" id="signup-job" required class="w-full bg-white border border-blue-100 rounded-lg px-4 py-2.5 text-[14px] focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all" placeholder="예: 개발자, 디자이너, 기획자">
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="w-full bg-gradient-to-br from-success to-success/90 text-white font-medium py-3 rounded-lg shadow-lg shadow-success/30 hover:opacity-90 transition-opacity text-[14px] mb-3">
                        가입하기
                    </button>
                    <button type="button" onclick="showLoginView()" class="w-full bg-white border border-blue-100 text-on-surface font-medium py-3 rounded-lg hover:bg-blue-50 transition-all text-[14px]">
                        로그인으로 돌아가기
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 메인 레이아웃 -->
    <div id="app-view" class="hidden w-full h-full flex">
        <!-- 모바일 오버레이 -->
        <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden" onclick="toggleMobileMenu()"></div>
        
        <!-- 사이드바 -->
        <aside id="sidebar" class="fixed lg:relative w-64 bg-white border-r border-blue-50/50 flex flex-col h-full shrink-0 shadow-[4px_0_24px_rgba(0,51,96,0.02)] z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="h-20 flex items-center justify-between px-6 border-b border-blue-50/50">
                <div class="flex-1 text-center">
                    <h2 class="font-display font-bold text-lg text-primary tracking-tight">차일디 운영 관리 시스템</h2>
                    <p id="division-label" class="text-[11px] text-on-surface-variant font-bold mt-0.5">[운영본부]</p>
                </div>
                <button onclick="toggleMobileMenu()" class="lg:hidden text-on-surface-variant hover:text-primary p-2 absolute right-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6">
                <p class="text-[10px] uppercase font-bold text-on-surface-variant/60 tracking-wider mb-4">작업 공간</p>
                <nav class="flex flex-col gap-1" id="nav-menu">
                    <!-- JS에서 동적 렌더링 -->
                </nav>
            </div>

            <div class="mt-auto p-6 border-t border-blue-50/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary font-bold" id="user-avatar">
                        M
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-semibold" id="auth-user-name">Member</p>
                        <p class="text-xs text-on-surface-variant cursor-pointer hover:text-primary" id="btn-edit-profile" onclick="openPasswordChangeModal()">내 정보 수정</p>
                    </div>
                    <button id="btn-logout" class="w-8 h-8 rounded-lg bg-surface-container hover:bg-blue-100 flex items-center justify-center text-on-surface-variant hover:text-primary transition-all" title="로그아웃">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 중앙 메인 콘텐츠 -->
        <main class="flex-1 bg-surface h-full overflow-y-auto relative w-full">
            <!-- 헤더 -->
            <header class="h-20 px-4 lg:px-10 flex items-center justify-between sticky top-0 bg-surface/80 backdrop-blur-md z-20 border-b border-blue-50/30">
                <div class="flex items-center gap-3">
                    <button onclick="toggleMobileMenu()" class="lg:hidden text-on-surface-variant hover:text-primary p-2 -ml-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 id="page-title" class="font-display text-xl lg:text-2xl font-semibold tracking-tight">Dashboard</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <div id="current-date" class="text-xs lg:text-sm font-bold text-on-surface">2026. 04. 16</div>
                        <div id="current-time" class="text-[10px] lg:text-xs font-medium text-on-surface-variant">00:00:00</div>
                    </div>
                </div>
            </header>

            <!-- 동적 라우팅 컨테이너 -->
            <div id="content-area" class="px-4 lg:px-10 pb-10 max-w-[1400px] mx-auto">
                <!-- 뷰 컴포넌트들이 여길 교체함 -->
            </div>
        </main>
    </div>

    <script src="baserow-api.js"></script>
    <script src="script.js"></script>
    <script src="script-mobile.js"></script>
</body>
</html>
